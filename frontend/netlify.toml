[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  VITE_ARTIST_FACEBOOK_URL = "https://www.facebook.com/borna.original.art"
  VITE_CLOUDINARY_CLOUD_NAME = "digw09pwb"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
