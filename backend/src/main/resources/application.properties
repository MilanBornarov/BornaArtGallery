# Server
server.port=${PORT:8080}
server.forward-headers-strategy=framework
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.whitelabel.enabled=false

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.access-token-secret=${JWT_SECRET}
jwt.access-token-expiration-ms=${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
jwt.refresh-token-expiration-ms=${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.folder=${CLOUDINARY_FOLDER:borna-art}

# App config
app.allowed-origins=${APP_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.contact.facebook-link=${FACEBOOK_LINK}
app.auth.refresh-cookie-name=${APP_REFRESH_COOKIE_NAME:refresh_token}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}
app.upload.max-file-size-mb=${APP_UPLOAD_MAX_FILE_SIZE_MB:10}
app.rate-limit.login.capacity=${APP_RATE_LIMIT_LOGIN_CAPACITY:5}
app.rate-limit.login.window-minutes=${APP_RATE_LIMIT_LOGIN_WINDOW_MINUTES:15}
app.rate-limit.register.capacity=${APP_RATE_LIMIT_REGISTER_CAPACITY:3}
app.rate-limit.register.window-minutes=${APP_RATE_LIMIT_REGISTER_WINDOW_MINUTES:30}
app.rate-limit.refresh.capacity=${APP_RATE_LIMIT_REFRESH_CAPACITY:12}
app.rate-limit.refresh.window-minutes=${APP_RATE_LIMIT_REFRESH_WINDOW_MINUTES:15}
app.rate-limit.upload.capacity=${APP_RATE_LIMIT_UPLOAD_CAPACITY:10}
app.rate-limit.upload.window-minutes=${APP_RATE_LIMIT_UPLOAD_WINDOW_MINUTES:60}
app.rate-limit.admin-mutation.capacity=${APP_RATE_LIMIT_ADMIN_MUTATION_CAPACITY:30}
app.rate-limit.admin-mutation.window-minutes=${APP_RATE_LIMIT_ADMIN_MUTATION_WINDOW_MINUTES:60}
app.rate-limit.favorites.capacity=${APP_RATE_LIMIT_FAVORITES_CAPACITY:30}
app.rate-limit.favorites.window-minutes=${APP_RATE_LIMIT_FAVORITES_WINDOW_MINUTES:60}

# Groq automatic translation via OpenAI-compatible API
openai.api-key=${OPENAI_API_KEY}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
openai.translation-model=${OPENAI_TRANSLATION_MODEL:gpt-5-mini}

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
